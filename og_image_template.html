<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0e0d0b;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    position: relative;
  }

  /* Warm top-right glow */
  body::before {
    content: '';
    position: absolute;
    top: -140px; right: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(172,142,102,0.09) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Bottom-left glow */
  body::after {
    content: '';
    position: absolute;
    bottom: -100px; left: -80px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(172,142,102,0.05) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Left panel ────────────────────────────────────────────── */
  .left {
    position: relative;
    z-index: 1;
    width: 510px;
    padding: 52px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .zen-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #AC8E66;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #5a5248;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .headline {
    font-size: 76px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: #ede8e0;
  }

  .headline .accent {
    display: block;
    font-weight: 900;
    font-size: 76px;
    letter-spacing: -0.04em;
    color: #6b5e48;
    margin-top: 2px;
  }

  .tagline {
    margin-top: 22px;
    font-size: 13.5px;
    font-weight: 400;
    color: #4a4540;
    line-height: 1.65;
    max-width: 330px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    background: rgba(172,142,102,0.06);
    border: 1px solid rgba(172,142,102,0.14);
    border-radius: 999px;
    padding: 5px 14px 5px 10px;
  }

  .pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #7a7060;
    letter-spacing: 0.02em;
  }

  .url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: #3a3428;
    letter-spacing: 0.08em;
  }

  /* ── Divider ───────────────────────────────────────────────── */
  .divider {
    position: absolute;
    left: 510px;
    top: 44px;
    bottom: 44px;
    width: 1px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(172,142,102,0.14) 25%,
      rgba(172,142,102,0.14) 75%,
      transparent 100%
    );
    z-index: 1;
  }

  /* ── Right panel ───────────────────────────────────────────── */
  .right {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .transform-svg {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

  <div class="divider"></div>

  <!-- LEFT -->
  <div class="left">
    <div>
      <p class="zen-mark">禅 ZenPost Studio</p>
      <p class="label">Denis Bitter · Content AI Studio</p>
      <h1 class="headline">
        Einmal.<br>
        <span class="accent">Überall.</span>
      </h1>
      <p class="tagline">Schreibe einmal — transformiere in plattformspezifische Formate für LinkedIn, Blog, Reddit, Newsletter und mehr.</p>
    </div>

    <div class="features">
      <div class="pill">
        <div class="pill-dot" style="background:#AC8E66"></div>
        <span class="pill-text">KI Transformation · Multi-Plattform</span>
      </div>
      <div class="pill">
        <div class="pill-dot" style="background:#88b882"></div>
        <span class="pill-text">Content Planer · ZenImage</span>
      </div>
      <div class="pill">
        <div class="pill-dot" style="background:#7b9cd4"></div>
        <span class="pill-text">ZenCloud · Blog Publishing</span>
      </div>
    </div>

    <p class="url">zenpost.denisbitter.de</p>
  </div>

  <!-- RIGHT: Document Transformation Visual -->
  <div class="right">
    <svg class="transform-svg" viewBox="0 0 690 630" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="center-glow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="soft-glow" x="-70%" y="-70%" width="240%" height="240%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(172,142,102,0.07)"/>
          <stop offset="100%" stop-color="rgba(172,142,102,0)"/>
        </radialGradient>
      </defs>

      <!-- Center anchor: 345, 315 -->

      <!-- Background glow circle -->
      <circle cx="345" cy="315" r="200" fill="url(#bgGlow)"/>

      <!-- ── Orbit rings ──────────────────────────────────────── -->
      <circle cx="345" cy="315" r="92"
        fill="none" stroke="rgba(172,142,102,0.14)" stroke-width="1"/>
      <circle cx="345" cy="315" r="178"
        fill="none" stroke="rgba(172,142,102,0.08)" stroke-width="1"
        stroke-dasharray="5 9"/>
      <circle cx="345" cy="315" r="262"
        fill="none" stroke="rgba(172,142,102,0.04)" stroke-width="1"
        stroke-dasharray="2 14"/>

      <!-- ── Connector lines (center → ring-1) ──────────────── -->
      <!-- top 270° -->
      <line x1="345" y1="269" x2="345" y2="225" stroke="rgba(172,142,102,0.2)" stroke-width="0.75"/>
      <!-- top-right 315° -->
      <line x1="410" y1="250" x2="451" y2="210" stroke="rgba(172,142,102,0.1)" stroke-width="0.75"/>
      <!-- right 0° -->
      <line x1="437" y1="315" x2="521" y2="315" stroke="rgba(172,142,102,0.1)" stroke-width="0.75"/>
      <!-- bottom-right 45° -->
      <line x1="410" y1="380" x2="451" y2="420" stroke="rgba(172,142,102,0.1)" stroke-width="0.75"/>
      <!-- bottom 90° -->
      <line x1="345" y1="407" x2="345" y2="491" stroke="rgba(172,142,102,0.1)" stroke-width="0.75"/>
      <!-- left 180° -->
      <line x1="253" y1="315" x2="169" y2="315" stroke="rgba(172,142,102,0.1)" stroke-width="0.75"/>

      <!-- ── Center document icon ────────────────────────────── -->
      <circle cx="345" cy="315" r="46"
        fill="rgba(172,142,102,0.07)" filter="url(#center-glow)"/>
      <circle cx="345" cy="315" r="46"
        fill="#141210" stroke="rgba(172,142,102,0.28)" stroke-width="1.5"/>

      <!-- Doc body -->
      <rect x="326" y="292" width="38" height="46" rx="4"
        fill="#1c1915" stroke="rgba(172,142,102,0.4)" stroke-width="1.5"/>
      <!-- Folded corner -->
      <polygon points="326,292 326,302 336,292"
        fill="#0e0d0b" stroke="rgba(172,142,102,0.22)" stroke-width="0.75"/>
      <!-- Doc lines -->
      <line x1="334" y1="307" x2="356" y2="307" stroke="rgba(172,142,102,0.6)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="334" y1="315" x2="356" y2="315" stroke="rgba(172,142,102,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="334" y1="323" x2="350" y2="323" stroke="rgba(172,142,102,0.28)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="334" y1="331" x2="353" y2="331" stroke="rgba(172,142,102,0.2)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ── Ring 1 nodes (r=92) — 6 platforms ──────────────── -->

      <!-- Top 270° → (345, 223) — LinkedIn highlighted -->
      <g transform="translate(345, 223)" filter="url(#glow)">
        <circle cx="0" cy="0" r="13" fill="#141210" stroke="#7b9cd4" stroke-width="1.75"/>
        <circle cx="0" cy="0" r="5.5" fill="#7b9cd4"/>
        <text x="0" y="-21"
          text-anchor="middle" dominant-baseline="auto"
          font-family="IBM Plex Mono, monospace" font-size="10.5"
          font-weight="600" fill="#7b9cd4" letter-spacing="0.08em">LinkedIn</text>
      </g>

      <!-- Top-right 315° → (410, 250) — Blog -->
      <g transform="translate(410, 250)">
        <circle cx="0" cy="0" r="10" fill="#141210" stroke="rgba(172,142,102,0.38)" stroke-width="1.25"/>
        <circle cx="0" cy="0" r="4" fill="rgba(172,142,102,0.55)"/>
        <text x="18" y="-12"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace" font-size="9.5"
          fill="#6b5c44" letter-spacing="0.06em">Blog</text>
      </g>

      <!-- Right 0° → (437, 315) — Twitter/X -->
      <g transform="translate(437, 315)">
        <circle cx="0" cy="0" r="10" fill="#141210" stroke="rgba(172,142,102,0.32)" stroke-width="1.25"/>
        <circle cx="0" cy="0" r="4" fill="rgba(172,142,102,0.48)"/>
        <text x="20" y="4"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace" font-size="9.5"
          fill="#6b5c44" letter-spacing="0.06em">Twitter / X</text>
      </g>

      <!-- Bottom-right 45° → (410, 380) — Reddit highlighted green -->
      <g transform="translate(410, 380)" filter="url(#soft-glow)">
        <circle cx="0" cy="0" r="11" fill="#141210" stroke="#88b882" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="4.5" fill="#88b882"/>
        <text x="18" y="16"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace" font-size="9.5"
          font-weight="600" fill="#88b882" letter-spacing="0.06em">Reddit</text>
      </g>

      <!-- Bottom 90° → (345, 407) — Newsletter -->
      <g transform="translate(345, 407)">
        <circle cx="0" cy="0" r="10" fill="#141210" stroke="rgba(172,142,102,0.32)" stroke-width="1.25"/>
        <circle cx="0" cy="0" r="4" fill="rgba(172,142,102,0.48)"/>
        <text x="0" y="22"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace" font-size="9.5"
          fill="#6b5c44" letter-spacing="0.06em">Newsletter</text>
      </g>

      <!-- Left 180° → (253, 315) — Instagram -->
      <g transform="translate(253, 315)">
        <circle cx="0" cy="0" r="10" fill="#141210" stroke="rgba(172,142,102,0.32)" stroke-width="1.25"/>
        <circle cx="0" cy="0" r="4" fill="rgba(172,142,102,0.48)"/>
        <text x="-20" y="4"
          text-anchor="end"
          font-family="IBM Plex Mono, monospace" font-size="9.5"
          fill="#6b5c44" letter-spacing="0.06em">Instagram</text>
      </g>

      <!-- ── Ring 2 nodes (r=178) — sparse ──────────────────── -->

      <!-- 330° → (345+154, 315-89) = (499, 226) — KI Studio -->
      <g transform="translate(499, 226)" filter="url(#soft-glow)">
        <circle cx="0" cy="0" r="8" fill="#141210" stroke="rgba(172,142,102,0.3)" stroke-width="1.25"/>
        <circle cx="0" cy="0" r="3.5" fill="rgba(172,142,102,0.45)"/>
        <text x="18" y="4"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace" font-size="8.5"
          fill="#5a4e3c" letter-spacing="0.06em">KI Studio</text>
      </g>

      <!-- 210° → (345-154, 315+89) = (191, 404) — ZenCloud -->
      <g transform="translate(191, 404)">
        <circle cx="0" cy="0" r="7" fill="#141210" stroke="rgba(172,142,102,0.2)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3" fill="rgba(172,142,102,0.32)"/>
        <text x="0" y="18"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace" font-size="8"
          fill="#3e3428" letter-spacing="0.06em">ZenCloud</text>
      </g>

      <!-- 90° → (345, 315+178) = (345, 493) — Planer -->
      <g transform="translate(345, 493)">
        <circle cx="0" cy="0" r="6.5" fill="rgba(136,184,130,0.08)" stroke="rgba(136,184,130,0.24)" stroke-width="1"/>
        <circle cx="0" cy="0" r="2.5" fill="rgba(136,184,130,0.5)"/>
        <text x="0" y="18"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace" font-size="8"
          fill="#3e5e3a" letter-spacing="0.06em">Planer</text>
      </g>

      <!-- 270° → (345, 315-178) = (345, 137) — ZenImage -->
      <g transform="translate(345, 137)">
        <circle cx="0" cy="0" r="6" fill="rgba(123,156,212,0.08)" stroke="rgba(123,156,212,0.22)" stroke-width="1"/>
        <circle cx="0" cy="0" r="2.5" fill="rgba(123,156,212,0.45)"/>
        <text x="0" y="-14"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace" font-size="8"
          fill="#3a4e6a" letter-spacing="0.06em">ZenImage</text>
      </g>

      <!-- ── Active arc LinkedIn → Blog ─────────────────────── -->
      <path d="M 345 223 A 92 92 0 0 1 410 250"
        fill="none" stroke="rgba(123,156,212,0.25)"
        stroke-width="2" stroke-linecap="round"/>

      <!-- Active arc Reddit → Newsletter -->
      <path d="M 410 380 A 92 92 0 0 1 345 407"
        fill="none" stroke="rgba(136,184,130,0.2)"
        stroke-width="1.5" stroke-linecap="round"/>

    </svg>
  </div>

</body>
</html>
