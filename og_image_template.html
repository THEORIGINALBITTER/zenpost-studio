<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0e0d0b;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    position: relative;
  }

  /* Warm glow top-right */
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -60px;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(172,142,102,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Bottom-left glow */
  body::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -40px;
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(172,142,102,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Left panel ─────────────────────────────────────────────── */
  .left {
    position: relative;
    z-index: 1;
    width: 520px;
    padding: 56px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #6b6558;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .zen-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #AC8E66;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .headline {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.04em;
    color: #e8e3d7;
  }

  .headline .accent {
    color: #d0cbb8;
    display: block;
    font-weight: 800;
    font-size: 50px;
    letter-spacing: -0.03em;
    margin-top: 4px;
  }

  .tagline {
    margin-top: 20px;
    font-size: 14px;
    font-weight: 400;
    color: #4e4840;
    line-height: 1.65;
    max-width: 340px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(172,142,102,0.12);
    border-radius: 999px;
    padding: 5px 13px 5px 9px;
  }

  .pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
    color: #8a8070;
    letter-spacing: 0.02em;
  }

  .url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #3e3830;
    letter-spacing: 0.06em;
  }

  /* ── Divider ────────────────────────────────────────────────── */
  .divider {
    position: absolute;
    left: 520px;
    top: 48px;
    bottom: 48px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(172,142,102,0.12) 30%, rgba(172,142,102,0.12) 70%, transparent);
    z-index: 1;
  }

  /* ── Right panel ────────────────────────────────────────────── */
  .right {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .transform-svg {
    width: 560px;
    height: 560px;
    overflow: visible;
  }
</style>
</head>
<body>

  <div class="divider"></div>

  <!-- LEFT -->
  <div class="left">
    <div>
      <p class="zen-mark">禅 ZenPost Studio</p>
      <p class="label">Denis Bitter · Content AI Studio</p>
      <h1 class="headline">
        Einmal.
        <span class="accent">Überall.</span>
      </h1>
      <p class="tagline">Schreibe einmal — transformiere in plattformspezifische Formate für LinkedIn, Blog, Reddit, Newsletter und mehr.</p>
    </div>

    <div class="features">
      <div class="pill">
        <div class="pill-dot" style="background:#AC8E66"></div>
        <span class="pill-text">KI Transformation · Multi-Plattform</span>
      </div>
      <div class="pill">
        <div class="pill-dot" style="background:#88b882"></div>
        <span class="pill-text">Content Planer · ZenImage</span>
      </div>
      <div class="pill">
        <div class="pill-dot" style="background:#7b9cd4"></div>
        <span class="pill-text">ZenCloud · Blog Publishing</span>
      </div>
    </div>

    <p class="url">zenpost.denisbitter.de</p>
  </div>

  <!-- RIGHT: Document Transformation Visual -->
  <div class="right">
    <svg class="transform-svg" viewBox="-280 -280 560 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="center-glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ── Orbit rings ─────────────────────────────────────── -->
      <circle cx="0" cy="0" r="80"
        fill="none"
        stroke="rgba(172,142,102,0.12)"
        stroke-width="1"/>

      <circle cx="0" cy="0" r="155"
        fill="none"
        stroke="rgba(172,142,102,0.07)"
        stroke-width="1"
        stroke-dasharray="4 8"/>

      <circle cx="0" cy="0" r="230"
        fill="none"
        stroke="rgba(172,142,102,0.04)"
        stroke-width="1"
        stroke-dasharray="2 12"/>

      <!-- ── Center: Document icon ───────────────────────────── -->
      <circle cx="0" cy="0" r="40"
        fill="rgba(172,142,102,0.06)"
        filter="url(#center-glow)"/>

      <!-- Document body -->
      <rect x="-18" y="-23" width="36" height="46" rx="4"
        fill="#1a1814"
        stroke="rgba(172,142,102,0.35)"
        stroke-width="1.5"/>
      <!-- Folded corner -->
      <polygon points="-18,-23 -18,-13 -8,-23"
        fill="#0e0d0b"
        stroke="rgba(172,142,102,0.2)"
        stroke-width="0.5"/>
      <!-- Document lines -->
      <line x1="-10" y1="-7" x2="12" y2="-7" stroke="rgba(172,142,102,0.5)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-10" y1="1" x2="12" y2="1" stroke="rgba(172,142,102,0.35)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-10" y1="9" x2="7" y2="9" stroke="rgba(172,142,102,0.25)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-10" y1="17" x2="10" y2="17" stroke="rgba(172,142,102,0.2)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ── Connector lines (center → ring-1 nodes) ──────────── -->
      <!-- top -->
      <line x1="0" y1="-40" x2="0" y2="-71" stroke="rgba(172,142,102,0.18)" stroke-width="0.5"/>
      <!-- top-right -->
      <line x1="28" y1="-28" x2="56" y2="-56" stroke="rgba(172,142,102,0.10)" stroke-width="0.5"/>
      <!-- right -->
      <line x1="40" y1="0" x2="71" y2="0" stroke="rgba(172,142,102,0.10)" stroke-width="0.5"/>
      <!-- bottom-right -->
      <line x1="28" y1="28" x2="56" y2="56" stroke="rgba(172,142,102,0.10)" stroke-width="0.5"/>
      <!-- bottom -->
      <line x1="0" y1="40" x2="0" y2="71" stroke="rgba(172,142,102,0.10)" stroke-width="0.5"/>
      <!-- left -->
      <line x1="-40" y1="0" x2="-71" y2="0" stroke="rgba(172,142,102,0.10)" stroke-width="0.5"/>

      <!-- ── Ring 1 nodes (r=80) — 6 platforms ─────────────────── -->

      <!-- Top (270°) → LinkedIn — highlighted -->
      <g transform="translate(0, -80)" filter="url(#glow)">
        <circle cx="0" cy="0" r="10" fill="#1a1814" stroke="#7b9cd4" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="4.5" fill="#7b9cd4"/>
        <text x="0" y="-18"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace"
          font-size="9.5"
          font-weight="600"
          fill="#7b9cd4"
          letter-spacing="0.08em">LinkedIn</text>
      </g>

      <!-- Top-right (315°) → (56.6, -56.6) -->
      <g transform="translate(56.6, -56.6)">
        <circle cx="0" cy="0" r="8" fill="#1a1814" stroke="rgba(172,142,102,0.35)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3.5" fill="rgba(172,142,102,0.5)"/>
        <text x="18" y="-10"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace"
          font-size="9"
          fill="#6b5e4a"
          letter-spacing="0.06em">Blog</text>
      </g>

      <!-- Right (0°) → (80, 0) -->
      <g transform="translate(80, 0)">
        <circle cx="0" cy="0" r="8" fill="#1a1814" stroke="rgba(172,142,102,0.3)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3.5" fill="rgba(172,142,102,0.45)"/>
        <text x="20" y="4"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace"
          font-size="9"
          fill="#6b5e4a"
          letter-spacing="0.06em">Twitter/X</text>
      </g>

      <!-- Bottom-right (45°) → (56.6, 56.6) — highlighted green -->
      <g transform="translate(56.6, 56.6)" filter="url(#soft-glow)">
        <circle cx="0" cy="0" r="9" fill="#1a1814" stroke="#88b882" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="4" fill="#88b882"/>
        <text x="18" y="14"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace"
          font-size="9"
          font-weight="600"
          fill="#88b882"
          letter-spacing="0.06em">Reddit</text>
      </g>

      <!-- Bottom (90°) → (0, 80) -->
      <g transform="translate(0, 80)">
        <circle cx="0" cy="0" r="8" fill="#1a1814" stroke="rgba(172,142,102,0.3)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3.5" fill="rgba(172,142,102,0.45)"/>
        <text x="0" y="20"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace"
          font-size="9"
          fill="#6b5e4a"
          letter-spacing="0.06em">Newsletter</text>
      </g>

      <!-- Left (180°) → (-80, 0) -->
      <g transform="translate(-80, 0)">
        <circle cx="0" cy="0" r="8" fill="#1a1814" stroke="rgba(172,142,102,0.3)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3.5" fill="rgba(172,142,102,0.45)"/>
        <text x="-20" y="4"
          text-anchor="end"
          font-family="IBM Plex Mono, monospace"
          font-size="9"
          fill="#6b5e4a"
          letter-spacing="0.06em">Instagram</text>
      </g>

      <!-- ── Ring 2 nodes (r=155) ─── sparse ────────────────── -->

      <!-- 330° → (134.2, -77.5) — KI -->
      <g transform="translate(134.2, -77.5)" filter="url(#soft-glow)">
        <circle cx="0" cy="0" r="7" fill="#1a1814" stroke="rgba(172,142,102,0.28)" stroke-width="1"/>
        <circle cx="0" cy="0" r="3" fill="rgba(172,142,102,0.4)"/>
        <text x="18" y="4"
          text-anchor="start"
          font-family="IBM Plex Mono, monospace"
          font-size="8.5"
          fill="#5a4e3c"
          letter-spacing="0.06em">KI Studio</text>
      </g>

      <!-- 210° → (-134.2, 77.5) -->
      <g transform="translate(-134.2, 77.5)">
        <circle cx="0" cy="0" r="6" fill="#1a1814" stroke="rgba(172,142,102,0.18)" stroke-width="1"/>
        <circle cx="0" cy="0" r="2.5" fill="rgba(172,142,102,0.3)"/>
        <text x="-18" y="16"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace"
          font-size="8"
          fill="#3e3428"
          letter-spacing="0.06em">ZenCloud</text>
      </g>

      <!-- 90° → (0, 155) -->
      <g transform="translate(0, 155)">
        <circle cx="0" cy="0" r="5.5" fill="rgba(136,184,130,0.08)" stroke="rgba(136,184,130,0.22)" stroke-width="1"/>
        <circle cx="0" cy="0" r="2" fill="rgba(136,184,130,0.45)"/>
        <text x="0" y="18"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace"
          font-size="7.5"
          fill="#3e5e3a"
          letter-spacing="0.06em">Planer</text>
      </g>

      <!-- 270° → (0, -155) -->
      <g transform="translate(0, -155)">
        <circle cx="0" cy="0" r="5" fill="rgba(123,156,212,0.08)" stroke="rgba(123,156,212,0.2)" stroke-width="1"/>
        <circle cx="0" cy="0" r="2" fill="rgba(123,156,212,0.4)"/>
        <text x="0" y="-15"
          text-anchor="middle"
          font-family="IBM Plex Mono, monospace"
          font-size="7.5"
          fill="#3a4e6a"
          letter-spacing="0.06em">ZenImage</text>
      </g>

      <!-- ── Active arc (LinkedIn area) ─────────────────────── -->
      <path d="M 0 -80 A 80 80 0 0 1 56.6 -56.6"
        fill="none"
        stroke="rgba(123,156,212,0.22)"
        stroke-width="1.5"
        stroke-linecap="round"/>

    </svg>
  </div>

</body>
</html>
