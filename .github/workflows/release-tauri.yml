name: release-tauri

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tauri_args: --target universal-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: ubuntu-22.04
            tauri_args: --bundles appimage
            rust_targets: ""
          - os: windows-latest
            tauri_args: --bundles msi
            rust_targets: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Detect macOS signing availability
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.os }}" != "macos-latest" ]; then
            echo "apple_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$APPLE_CERTIFICATE" ] && \
             [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && \
             [ -n "$APPLE_SIGNING_IDENTITY" ] && \
             [ -n "$KEYCHAIN_PASSWORD" ] && \
             [ -n "$APPLE_ID" ] && \
             [ -n "$APPLE_PASSWORD" ] && \
             [ -n "$APPLE_TEAM_ID" ]; then
            echo "apple_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Signing mode info
        run: |
          if [ "${{ matrix.os }}" != "macos-latest" ]; then
            echo "Release mode: unsigned (non-macOS target)"
          elif [ "${{ steps.signing.outputs.apple_ready }}" = "true" ]; then
            echo "Release mode: signed + notarized (macOS)"
          else
            echo "Release mode: unsigned fallback (macOS secrets missing)"
          fi

      - name: Build & Release (macOS signed + notarized)
        if: matrix.os == 'macos-latest' && steps.signing.outputs.apple_ready == 'true'
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (Developer ID certificate exported as .p12 -> base64)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # macOS notarization (Apple ID + app-specific password)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZenPost Studio ${{ github.ref_name }}"
          releaseBody: |
            Automated build for ${{ github.ref_name }}
            macOS build signed and notarized.
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Build & Release (unsigned fallback)
        if: matrix.os != 'macos-latest' || steps.signing.outputs.apple_ready != 'true'
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZenPost Studio ${{ github.ref_name }}"
          releaseBody: |
            Automated build for ${{ github.ref_name }}

            ## macOS Hinweis
            Diese Version ist aktuell nicht notarisiert.

            Beim ersten Start auf macOS:
            1. App nach `Programme` verschieben
            2. Rechtsklick auf `ZenPost Studio.app` -> `Öffnen`
            3. Im zweiten Dialog erneut `Öffnen`

            Falls nötig im Terminal:
            `xattr -dr com.apple.quarantine "/Applications/ZenPost Studio.app"`

            Details: https://github.com/THEORIGINALBITTER/zenpost-studio/blob/main/docs/INSTALL_MACOS.md
          prerelease: false
          args: ${{ matrix.tauri_args }}
