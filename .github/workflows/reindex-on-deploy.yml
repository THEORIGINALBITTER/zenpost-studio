name: SEO Re-Index on Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib requests

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          cd scripts/seo
          python gsc_reindex.py --site https://zenpost.denisbitter.de
